name: Build iOS IPA (Unsigned)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build shared framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Build iOS App Archive
        run: |
          cd iosApp
          xcodebuild archive \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -configuration Release \
            -archivePath $PWD/build/iosApp.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export Unsigned IPA
        run: |
          cd iosApp/build
          mkdir -p Payload
          cp -r iosApp.xcarchive/Products/Applications/iosApp.app Payload/
          zip -r UntisNeo-iOS.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UntisNeo-iOS-IPA
          path: iosApp/build/UntisNeo-iOS.ipa
