name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv androidApp/build/outputs/apk/debug/androidApp-debug.apk androidApp/build/outputs/apk/debug/UntisNeo.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UntisNeo-Android-APK
          path: androidApp/build/outputs/apk/debug/UntisNeo.apk

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: androidApp/build/outputs/apk/debug/UntisNeo.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
